<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="planeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Ad trend line (performance growth) -->
  <polyline points="10,75 28,62 46,68 64,42 72,38"
    fill="none" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Trend dots -->
  <circle cx="28" cy="62" r="3" fill="#a5b4fc" opacity="0.6"/>
  <circle cx="46" cy="68" r="3" fill="#a5b4fc" opacity="0.6"/>
  <circle cx="64" cy="42" r="3" fill="#818cf8" opacity="0.7"/>

  <!-- Paper plane (pilot) — launching upward from trend -->
  <polygon points="88,15 42,45 56,52 48,68 88,15" fill="url(#planeGrad)"/>
  <!-- Plane inner fold line -->
  <line x1="48" y1="68" x2="88" y2="15" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="42" y1="45" x2="56" y2="52" stroke="white" stroke-width="0.8" opacity="0.2"/>

  <!-- Speed lines (motion trail) -->
  <line x1="30" y1="38" x2="44" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="25" y1="45" x2="38" y2="40" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
</svg>
